<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原型文件链接清单</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #333;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .header p { color: #999; font-size: 13px; }
    
    .table-wrapper {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8f9fc;
      padding: 14px 16px;
      text-align: left;
      font-size: 13px;
      color: #666;
      font-weight: 600;
      border-bottom: 1px solid #eee;
    }
    thead th:last-child { text-align: center; width: 100px; }
    tbody td {
      padding: 14px 16px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #f5f5f5;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafbff; }
    
    .file-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .file-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      flex-shrink: 0;
    }
    .file-link {
      color: #333;
      text-decoration: none;
      font-weight: 500;
    }
    .file-link:hover { color: #667eea; text-decoration: underline; }
    
    .link-short {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 14px;
      background: #f0f3ff;
      border-radius: 6px;
      display: inline-block;
      transition: all 0.2s;
    }
    .link-short:hover {
      background: #667eea;
      color: white;
    }
    
    .btn-xs {
      padding: 5px 12px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-copy-xs {
      background: #e8ebff;
      color: #667eea;
    }
    .btn-copy-xs:hover {
      background: #667eea;
      color: white;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .loading-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .footer {
      text-align: center;
      margin-top: 20px;
      color: #bbb;
      font-size: 12px;
    }
    
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      display: none;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 原型文件链接清单</h1>
      <p>点击文件名直接打开 · 点击复制获取链接</p>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>文件名</th>
            <th>链接</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="4">
              <div class="loading">
                <div class="loading-spinner"></div>
                正在读取...
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      上传新文件到仓库后，刷新页面即可更新
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BASE_URL = 'https://mumugaoer.github.io/github.com-new';
    const REPO_API = 'https://api.github.com/repos/mumugaoer/github.com-new/contents';

    const iconMap = {
      '角色管理': '👤',
      '角色套餐': '📦',
      '权限授权': '🔐',
      '授权日志': '📝',
      '我的权限': '🛡️',
      '用户管理': '👥',
      'index': '🏠'
    };

    function getIcon(filename) {
      for (const key in iconMap) {
        if (filename.includes(key)) return iconMap[key];
      }
      return '📄';
    }

    function getShortName(filename) {
      return filename.replace(/\.html$/, '');
    }

    function getLink(filename) {
      return `${BASE_URL}/${encodeURIComponent(filename)}`;
    }

    async function loadFiles() {
      try {
        const response = await fetch(REPO_API);
        if (!response.ok) throw new Error('获取失败');
        
        const files = await response.json();
        const htmlFiles = files
          .filter(f => f.name.endsWith('.html') && f.name !== 'index.html')
          .sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));

        renderTable(htmlFiles);
      } catch (error) {
        document.getElementById('tableBody').innerHTML = `
          <tr><td colspan="4"><div class="loading">⚠️ 加载失败，请刷新重试</div></td></tr>
        `;
      }
    }

    function renderTable(files) {
      const tbody = document.getElementById('tableBody');
      
      if (files.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="loading">📂 暂无文件</div></td></tr>`;
        return;
      }

      tbody.innerHTML = files.map((file, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>
            <div class="file-name">
              <div class="file-icon">${getIcon(file.name)}</div>
              <a class="file-link" href="${getLink(file.name)}" target="_blank">${file.name}</a>
            </div>
          </td>
          <td>
            <a class="link-short" href="${getLink(file.name)}" target="_blank">${getShortName(file.name)}</a>
          </td>
          <td>
            <button class="btn-xs btn-copy-xs" onclick="copyLink('${getLink(file.name)}')">复制</button>
          </td>
        </tr>
      `).join('');
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link).then(() => {
        showToast('✓ 已复制');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = link;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('✓ 已复制');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    loadFiles();
  </script>
</body>
</html>
